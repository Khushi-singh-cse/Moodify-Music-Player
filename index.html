<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Moodify | Music Player</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header>

    <h1>Moodify 🎵</h1>

</header>


<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <button class="playlist-btn active" data-playlist="happy">
            😊 Happy
        </button>

        <button class="playlist-btn" data-playlist="motivation">
            💪 Motivation
        </button>

        <button class="playlist-btn" data-playlist="relax">
            🌊 Relax
        </button>

        <button class="playlist-btn" data-playlist="sad">
            🌧 Sad
        </button>

    </aside>


    <!-- Main Player -->

    <main class="player">

        <img id="cover" src="" alt="Cover">

        <h2 id="title">Song Title</h2>

        <p id="artist">Playlist</p>

        <audio id="audio"></audio>


        <input
            type="range"
            id="progress"
            value="0"
            min="0"
            max="100"
        >


        <div class="controls">

            <button id="prev">
                <i class="fa-solid fa-backward"></i>
            </button>

            <button id="play">
                <i class="fa-solid fa-play"></i>
            </button>

            <button id="next">
                <i class="fa-solid fa-forward"></i>
            </button>

        </div>


        <div class="volume">

            <i class="fa-solid fa-volume-high"></i>

            <input
                type="range"
                id="volume"
                min="0"
                max="1"
                step="0.01"
                value="1"
            >

        </div>

    </main>


    <!-- Queue -->

    <aside class="queue">

        <h2>Now Playing</h2>

        <div id="songList"></div>

    </aside>

</div>


<script src="script.js"></script>

</body>

</html>
